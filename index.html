<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Developer Quiz Game</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <!-- Screen 1: Welcome -->
      <div class="screen active" id="start-screen">
        <h1>Quiz Time!</h1>
        <p>Test your knowledge with these fun questions</p>
        <button id="start-btn">Start Quiz</button>
      </div>

      <!-- Screen 2: Field Selection -->
      <div class="screen" id="selection-screen">
        <h1>Select Your Field</h1>
        <p>Choose your specialty to get customized questions</p>
        <div class="answers-container">
          <button class="answer-btn selection-btn" data-field="frontend">1. Frontend Developer</button>
          <button class="answer-btn selection-btn" data-field="backend">2. Backend Developer</button>
          <button class="answer-btn selection-btn" data-field="fullstack">3. Full Stack Developer</button>
          <button class="answer-btn selection-btn" data-field="ai">4. AI Engineer</button>
          <button class="answer-btn selection-btn" data-field="others">5. Others</button>
        </div>
      </div>

      <!-- Screen 3: Quiz -->
      <div class="screen" id="quiz-screen">
        <div class="quiz-header">
          <h2 id="question-text">Question goes here</h2>
          <div class="quiz-info">
            <p>
              Question <span id="current-question">1</span> of <span id="total-questions">5</span>
            </p>
            <p>Score: <span id="score">0</span></p>
          </div>
        </div>

        <div id="answers-container" class="answers-container">
          <!-- Answer buttons will be inserted here from our js code -->
        </div>

        <div class="progress-bar">
          <div id="progress" class="progress"></div>
        </div>
      </div>

      <!-- Screen 4: Results -->
      <div id="result-screen" class="screen">
        <h1>Quiz Results</h1>
        <div class="result-info">
          <p>You scored <span id="final-score">0</span> out of <span id="max-score">5</span></p>
          <div id="result-message">Good job!</div>
        </div>
        <button id="restart-btn">Restart Quiz</button>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
